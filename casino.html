<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Slot Machine</title>

<style>
body {
    background: radial-gradient(circle at center, #021e00 0%, #000300 80%);
    color: #c3e63e;
    font-family: Arial;
    text-align: center;
}

h1 {
    color: #fff;
    text-shadow: 0 0 15px #83b625;
}

.machine {
    position: relative;
    display: inline-block;
    padding: 20px;
    border-radius: 20px;
    background: linear-gradient(145deg, #021e00, #000300);
    box-shadow: 0 0 25px #83b625, inset 0 0 15px #83b625;
}

/* БАРАБАНЫ */
.reels {
    display: flex;
    gap: 10px;
}

.reel {
    width: 110px;
    height: 330px;
    overflow: hidden;
    background: #021e00;
    border-radius: 10px;
    position: relative;
}

.reel-track {
    position: absolute;
    width: 100%;
    top: 0;
}

.symbol {
    height: 110px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.symbol img {
    width: 80px;
}

/* подсветка */
.highlight img {
    animation: pulse 0.6s infinite alternate;
    filter: drop-shadow(0 0 10px #83b625)
            drop-shadow(0 0 25px #83b625);
}

@keyframes pulse {
    from { transform: scale(1); }
    to { transform: scale(1.15); }
}

/* линии */
#winLines {
    position: absolute;
    inset: 0;
    pointer-events: none;
}

.line {
    position: absolute;
    background: #83b625;
    height: 6px;
    box-shadow: 0 0 10px #83b625, 0 0 30px #83b625;
    border-radius: 10px;
}

/* кнопка */
button {
    margin-top: 15px;
    padding: 12px 25px;
    background: #83b625;
    border: none;
    font-size: 18px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>Slot Machine</h1>
<div>Баланс: <span id="money">250</span></div>

<div class="machine">
    <div id="winLines"></div>
    <div class="reels" id="reels"></div>
</div>

<button onclick="spin()">Крутить (-25)</button>

<script>
const symbols = [
    "symbol1.png",
    "symbol2.png",
    "symbol3.png",
    "symbol4.png",
    "symbol5.png",
    "symbol6.png"
];

let balance = 250;
let reels = [];
let resultGrid = [[],[],[]];

const reelsEl = document.getElementById("reels");

/* СОЗДАНИЕ БАРАБАНОВ */
function init() {
    for (let r = 0; r < 3; r++) {
        let reel = document.createElement("div");
        reel.classList.add("reel");

        let track = document.createElement("div");
        track.classList.add("reel-track");

        // много символов для прокрутки
        for (let i = 0; i < 20; i++) {
            let sym = document.createElement("div");
            sym.classList.add("symbol");

            let img = document.createElement("img");
            img.src = symbols[Math.floor(Math.random()*symbols.length)];

            sym.appendChild(img);
            track.appendChild(sym);
        }

        reel.appendChild(track);
        reelsEl.appendChild(reel);

        reels.push(track);
    }
}

/* СПИН */
function spin() {
    if (balance < 25) return alert("Нет денег");

    balance -= 25;
    document.getElementById("money").innerText = balance;

    document.getElementById("winLines").innerHTML = "";

    reels.forEach((track, i) => {
        let duration = 1000 + i * 500;
        let distance = 110 * (10 + Math.floor(Math.random()*10));

        track.style.transition = "none";
        track.style.transform = "translateY(0px)";

        setTimeout(() => {
            track.style.transition = `transform ${duration}ms cubic-bezier(.1,.7,.2,1)`;
            track.style.transform = `translateY(-${distance}px)`;
        }, 50);

        // остановка
        setTimeout(() => {
            let finalSymbols = [];

            for (let j = 0; j < 3; j++) {
                let sym = symbols[Math.floor(Math.random()*symbols.length)];
                finalSymbols.push(sym);

                track.children[j].querySelector("img").src = sym;
            }

            track.style.transition = "none";
            track.style.transform = "translateY(0px)";

            resultGrid[i] = finalSymbols;

            if (i === 2) checkWin();

        }, duration + 100);
    });
}

/* ПОЛУЧЕНИЕ СЕТКИ */
function getMatrix() {
    let m = [];
    for (let r = 0; r < 3; r++) {
        for (let c = 0; c < 3; c++) {
            m[r*3 + c] = resultGrid[c][r];
        }
    }
    return m;
}

/* ПРОВЕРКА */
function checkLine(a,b,c){ return a===b && b===c }

function checkWin() {
    let m = getMatrix();

    const lines = [
        [0,1,2],[3,4,5],[6,7,8],
        [0,3,6],[1,4,7],[2,5,8],
        [0,4,8],[2,4,6]
    ];

    lines.forEach(line => {
        if (checkLine(m[line[0]], m[line[1]], m[line[2]])) {
            drawLine(line);
            balance += 50;
        }
    });

    document.getElementById("money").innerText = balance;
}

/* РИСОВАНИЕ ЛИНИИ */
function drawLine(indices) {
    const container = document.getElementById("winLines");

    let line = document.createElement("div");
    line.classList.add("line");

    if (indices[0] === 0 && indices[1] === 1) {
        line.style.top = "55px";
        line.style.width = "100%";
    } else if (indices[0] === 3) {
        line.style.top = "165px";
        line.style.width = "100%";
    } else if (indices[0] === 6) {
        line.style.top = "275px";
        line.style.width = "100%";
    }

    container.appendChild(line);
    setTimeout(()=>line.remove(),1500);
}

init();
</script>

</body>
</html>
