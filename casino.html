<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Slot Machine</title>

<style>
body {
    background: radial-gradient(circle at center, #021e00 0%, #000300 80%);
    color: #c3e63e;
    font-family: Arial;
    text-align: center;
}

.machine {
    display: inline-block;
    padding: 20px;
    border-radius: 20px;
    background: #021e00;
    box-shadow: 0 0 20px #83b625;
}

.reels {
    display: flex;
    gap: 10px;
}

.reel {
    width: 110px;
    height: 330px;
    overflow: hidden;
    background: #000;
    border-radius: 10px;
}

.reel-track {
    transition: transform 0.3s;
}

.symbol {
    height: 110px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.symbol img {
    width: 80px;
}

.win {
    box-shadow:
        inset 0 0 0 3px #83b625,
        0 0 10px #83b625,
        0 0 25px #83b625;
    animation: glow 0.6s infinite alternate;
}

@keyframes glow {
    from { transform: scale(1); }
    to { transform: scale(1.05); }
}

button {
    margin-top: 15px;
    padding: 12px 25px;
    background: #83b625;
    border: none;
    font-size: 18px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>Сдохни или умри</h1>
<div>Баланс: <span id="money">250</span></div>

<div class="machine">
    <div class="reels" id="reels"></div>
</div>

<button onclick="spin()">Крутить (-25)</button>

<audio id="tickSound" src="tick.mp3"></audio>

<script>
const symbols = [
    "symbol1.png",
    "symbol2.png",
    "symbol3.png",
    "symbol4.png",
    "symbol5.png",
    "symbol6.png"
];

let balance = 2500;
let reels = [];
let result = [[],[],[]];

const reelsEl = document.getElementById("reels");
const tick = document.getElementById("tickSound");

function init() {
    for (let r = 0; r < 3; r++) {
        let reel = document.createElement("div");
        reel.className = "reel";

        let track = document.createElement("div");
        track.className = "reel-track";

        for (let i = 0; i < 3; i++) {
            let sym = document.createElement("div");
            sym.className = "symbol";

            let img = document.createElement("img");
            img.src = symbols[Math.floor(Math.random()*symbols.length)];

            sym.appendChild(img);
            track.appendChild(sym);
        }

        reel.appendChild(track);
        reelsEl.appendChild(reel);
        reels.push(track);
    }
}

function spin() {
    if (balance < 25) return;

    balance -= 25;
    update();

    clearWins();

    reels.forEach((track, i) => {
        let duration = 600 + i * 300;

        playTick(duration);

        let interval = setInterval(() => {
            for (let j = 0; j < 3; j++) {
                track.children[j].querySelector("img").src =
                    symbols[Math.floor(Math.random()*symbols.length)];
            }
        }, 80);

        setTimeout(() => {
            clearInterval(interval);

            let col = [];
            for (let j = 0; j < 3; j++) {
                let s = symbols[Math.floor(Math.random()*symbols.length)];
                track.children[j].querySelector("img").src = s;
                col.push(s);
            }

            result[i] = col;

            if (i === 2) checkWin();

        }, duration);
    });
}

/* МАТРИЦА */
function getM() {
    let m = [];
    for (let r = 0; r < 3; r++) {
        for (let c = 0; c < 3; c++) {
            m[r*3+c] = result[c][r];
        }
    }
    return m;
}

function eq(a,b,c){ return a===b && b===c }

/* ПОДСВЕТКА */
function mark(indices) {
    indices.forEach(i=>{
        let r = Math.floor(i/3);
        let c = i%3;
        reels[c].children[r].classList.add("win");
    });
}

function clearWins() {
    document.querySelectorAll(".symbol").forEach(el=>{
        el.classList.remove("win");
    });
}

/* ПРОВЕРКА */
function checkWin() {
    let m = getM();

    const lines = [
        [0,1,2],[3,4,5],[6,7,8],
        [0,3,6],[1,4,7],[2,5,8],
        [0,4,8],[2,4,6]
    ];

    lines.forEach(line=>{
        if (eq(m[line[0]],m[line[1]],m[line[2]])) {
            mark(line);
            balance += 50;
        }
    });

    // крест
    if (eq(m[0],m[4],m[8]) && eq(m[2],m[4],m[6])) {
        mark([0,2,4,6,8]);
        balance += 150;
    }

    // плюс
    if (eq(m[1],m[4],m[7]) && eq(m[3],m[4],m[5])) {
        mark([1,3,4,5,7]);
        balance += 150;
    }

    // бинго
    if (m.every(v=>v===m[0])) {
        mark([0,1,2,3,4,5,6,7,8]);
        balance += 500;
    }

    update();
}

function update() {
    document.getElementById("money").innerText = balance;
}

init();
</script>

</body>
</html>
