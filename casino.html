<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Казик</title>

<style>
body {
    background: #000300;
    color: #c3e63e;
    font-family: Arial, sans-serif;
    text-align: center;
}

#machine {
    width: 320px;
    margin: 20px auto;
    padding: 20px;
    background: #021e00;
    border: 4px solid #83b625;
}

.window {
    display: flex;
    gap: 10px;
    background: #000;
    padding: 10px;
}

.reel {
    width: 80px;
    height: 240px;
    overflow: hidden;
    border: 2px solid #83b625;
    position: relative;
}

.strip {
    position: absolute;
    width: 100%;
}

.symbol {
    width: 80px;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.symbol img {
    width: 60px;
}

.spin {
    animation: spin 0.8s cubic-bezier(.2,.6,.3,1);
}

@keyframes spin {
    0% { transform: translateY(-400px); }
    100% { transform: translateY(0); }
}

button:disabled {
    opacity: 0.5;
}
</style>
</head>

<body>

<div id="balance">
    <span id="money"></span>
</div>

<div id="machine">
    <div class="window">
        <div class="reel"><div class="strip" id="r1"></div></div>
        <div class="reel"><div class="strip" id="r2"></div></div>
        <div class="reel"><div class="strip" id="r3"></div></div>
    </div>

    <button id="spinBtn" onclick="spin()">SPIN</button>
</div>

<script>
const icons = ["symbol1.png","symbol2.png","symbol3.png","symbol4.png","symbol5.png","symbol6.png"];
const cost = 25;
const reward = 100;

let balance = 250;
let isSpinning = false;

const reels = [
    document.getElementById("r1"),
    document.getElementById("r2"),
    document.getElementById("r3")
];

const button = document.getElementById("spinBtn");

function updateUI() {
    document.getElementById("money").innerText = balance;
}

function createStrip(centerSymbol) {
    let arr = [];

    for (let i = 0; i < 12; i++) {
        arr.push(icons[Math.floor(Math.random() * icons.length)]);
    }

    // фиксируем центр
    arr[5] = centerSymbol;

    return arr;
}

function renderStrip(reel, strip) {
    reel.innerHTML = "";

    strip.forEach(icon => {
        let div = document.createElement("div");
        div.className = "symbol";
        div.innerHTML = `<img src="${icon}">`;
        reel.appendChild(div);
    });
}

function spin() {
    if (isSpinning) return;
    if (balance < cost) return;

    isSpinning = true;
    button.disabled = true;

    balance -= cost;
    updateUI();

    // результат
    let result = [
        icons[Math.floor(Math.random() * icons.length)],
        icons[Math.floor(Math.random() * icons.length)],
        icons[Math.floor(Math.random() * icons.length)]
    ];

    let finished = 0;

    reels.forEach((reel, index) => {
        let strip = createStrip(result[index]);

        renderStrip(reel, strip);

        reel.style.transform = "translateY(-400px)";
        reel.offsetHeight; // форс рефлоу

        reel.classList.add("spin");

        setTimeout(() => {
            reel.classList.remove("spin");
            reel.style.transform = "translateY(0)";

            finished++;
            if (finished === 3) {
                setTimeout(() => checkWin(result), 100);
            }
        }, 400 + index * 300);
    });
}

function checkWin(result) {
    if (result[0] === result[1] && result[1] === result[2]) {
        balance += reward;
    }

    updateUI();

    isSpinning = false;
    button.disabled = false;
}

updateUI();
</script>

</body>
</html>
