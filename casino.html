<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>КАЗИК!!!</title>

<style>
body {
    background: radial-gradient(circle at center, #021e00 0%, #000300 80%);
    color: #c3e63e;
    font-family: Arial;
    text-align: center;
}

h1 {
    color: #fff;
    text-shadow: 0 0 15px #83b625;
}

.machine {
    position: relative;
    display: inline-block;
    padding: 20px;
    border-radius: 20px;
    background: linear-gradient(145deg, #021e00, #000300);
    box-shadow: 0 0 25px #83b625, inset 0 0 15px #83b625;
}

/* барабаны */
.reels {
    display: flex;
    gap: 10px;
}

.reel {
    width: 110px;
    height: 330px;
    overflow: hidden;
    background: #021e00;
    border-radius: 10px;
    position: relative;
}

.reel-track {
    position: absolute;
    width: 100%;
    top: 0;
    transition: transform 0.2s;
}

.symbol {
    height: 110px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.symbol img {
    width: 80px;
}

/* blur при прокрутке */
.spinning .symbol img {
    filter: blur(3px);
}

/* рамка выигрыша */
#winFrames {
    position: absolute;
    inset: 0;
    pointer-events: none;
}

.win-frame {
    position: absolute;
    border: 4px solid #83b625;
    border-radius: 12px;
    box-shadow: 0 0 15px #83b625, 0 0 30px #83b625;
    animation: frameAppear 0.3s ease;
}

@keyframes frameAppear {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

button {
    margin-top: 15px;
    padding: 12px 25px;
    background: #83b625;
    border: none;
    font-size: 18px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>СДОХНИ ИЛИ УМРИ</h1>
<div>Баланс: <span id="money">250</span></div>

<div class="machine">
    <div id="winFrames"></div>
    <div class="reels" id="reels"></div>
</div>

<button onclick="spin()">Крутить (-25)</button>

<!-- звук -->
<audio id="tickSound" src="tick.mp3" preload="auto"></audio>

<script>
const symbols = [
    "symbol1.png",
    "symbol2.png",
    "symbol3.png",
    "symbol4.png",
    "symbol5.png",
    "symbol6.png"
];

let balance = 25000;
let reels = [];
let resultGrid = [[],[],[]];
const reelsEl = document.getElementById("reels");
const tick = document.getElementById("tickSound");

/* создание барабанов */
function init() {
    for (let r = 0; r < 3; r++) {
        let reel = document.createElement("div");
        reel.classList.add("reel");

        let track = document.createElement("div");
        track.classList.add("reel-track");

        for (let i = 0; i < 20; i++) {
            let sym = document.createElement("div");
            sym.classList.add("symbol");

            let img = document.createElement("img");
            img.src = symbols[Math.floor(Math.random()*symbols.length)];

            sym.appendChild(img);
            track.appendChild(sym);
        }

        reel.appendChild(track);
        reelsEl.appendChild(reel);
        reels.push(track);
    }
}

/* звук щелчков */
function playTickLoop(duration) {
    let interval = setInterval(() => {
        tick.currentTime = 0;
        tick.play();
    }, 80);

    setTimeout(() => clearInterval(interval), duration);
}

/* спин */
function spin() {
    if (balance < 25) return alert("Нет денег");

    balance -= 25;
    document.getElementById("money").innerText = balance;

    document.getElementById("winFrames").innerHTML = "";
    reelsEl.classList.add("spinning");

    reels.forEach((track, i) => {
        let duration = 1000 + i * 400;
        let distance = 110 * (10 + Math.floor(Math.random()*10));

        track.style.transition = "none";
        track.style.transform = "translateY(0px)";

        setTimeout(() => {
            track.style.transition = `transform ${duration}ms cubic-bezier(.1,.7,.2,1)`;
            track.style.transform = `translateY(-${distance}px)`;
        }, 50);

        playTickLoop(duration);

        setTimeout(() => {
            let finalSymbols = [];

            for (let j = 0; j < 3; j++) {
                let sym = symbols[Math.floor(Math.random()*symbols.length)];
                finalSymbols.push(sym);
                track.children[j].querySelector("img").src = sym;
            }

            track.style.transition = "none";
            track.style.transform = "translateY(0px)";

            resultGrid[i] = finalSymbols;

            if (i === 2) {
                reelsEl.classList.remove("spinning");
                checkWin();
            }

        }, duration + 100);
    });
}

/* матрица */
function getMatrix() {
    let m = [];
    for (let r = 0; r < 3; r++) {
        for (let c = 0; c < 3; c++) {
            m[r*3 + c] = resultGrid[c][r];
        }
    }
    return m;
}

/* проверка */
function checkLine(a,b,c){ return a===b && b===c }

/* рамка */
function drawFrame(indices) {
    const container = document.getElementById("winFrames");
    const cells = document.querySelectorAll(".symbol");

    let first = cells[indices[0]].getBoundingClientRect();
    let last = cells[indices[2]].getBoundingClientRect();
    let parent = reelsEl.getBoundingClientRect();

    let frame = document.createElement("div");
    frame.classList.add("win-frame");

    frame.style.left = (first.left - parent.left) + "px";
    frame.style.top = (first.top - parent.top) + "px";
    frame.style.width = (last.right - first.left) + "px";
    frame.style.height = (last.bottom - first.top) + "px";

    container.appendChild(frame);
    setTimeout(()=>frame.remove(),1500);
}

/* выигрыш */
function checkWin() {
    let m = getMatrix();

    const lines = [
        [0,1,2],[3,4,5],[6,7,8],
        [0,3,6],[1,4,7],[2,5,8],
        [0,4,8],[2,4,6]
    ];

    lines.forEach(line => {
        if (checkLine(m[line[0]], m[line[1]], m[line[2]])) {
            drawFrame(line);
            balance += 50;
        }
    });

    document.getElementById("money").innerText = balance;
}

init();
</script>

</body>
</html>
