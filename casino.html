<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Сasic</title>

<style>
body {
    background: #000;
    color: #c3e63e;
    font-family: Arial;
    text-align: center;
}

#machine {
    width: 320px;
    margin: 30px auto;
    padding: 20px;
    background: #021e00;
    border: 4px solid #83b625;
}

.window {
    display: flex;
    gap: 10px;
    background: #000;
    padding: 10px;
}

.reel {
    width: 80px;
    height: 240px;
    overflow: hidden;
    border: 2px solid #83b625;
    position: relative;
}

.strip {
    position: absolute;
    width: 100%;
    transition: transform 0.7s cubic-bezier(.2,.6,.3,1);
}

.symbol {
    width: 80px;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.symbol img {
    width: 60px;
}

button {
    margin-top: 15px;
}

button:disabled {
    opacity: 0.5;
}
</style>
</head>

<body>

<h3>Баланс: <span id="money"></span></h3>

<div id="machine">
    <div class="window">
        <div class="reel"><div class="strip" id="r1"></div></div>
        <div class="reel"><div class="strip" id="r2"></div></div>
        <div class="reel"><div class="strip" id="r3"></div></div>
    </div>

    <button id="spinBtn">SPIN</button>
</div>

<script>
const icons = [
    "symbol1.png",
    "symbol2.png",
    "symbol3.png",
    "symbol4.png",
    "symbol5.png"
];

const cost = 20;
const reward = 100;

let balance = 200;
let spinning = false;

const reels = [
    document.getElementById("r1"),
    document.getElementById("r2"),
    document.getElementById("r3")
];

const btn = document.getElementById("spinBtn");

function updateUI() {
    money.innerText = balance;
}

function createStrip() {
    let arr = [];
    for (let i = 0; i < 30; i++) {
        arr.push(icons[Math.floor(Math.random() * icons.length)]);
    }
    return arr;
}

function render(reel, strip) {
    reel.innerHTML = "";
    strip.forEach(icon => {
        const d = document.createElement("div");
        d.className = "symbol";
        d.innerHTML = `<img src="${icon}">`;
        reel.appendChild(d);
    });
}

function spin() {
    if (spinning || balance < cost) return;

    spinning = true;
    btn.disabled = true;

    balance -= cost;
    updateUI();

    let finalGrid = [
        [], [], []
    ]; // 3 колонки по 3 символа

    reels.forEach((reel, i) => {
        let strip = createStrip();
        render(reel, strip);

        let stop = Math.floor(Math.random() * (strip.length - 3));

        // формируем видимые 3 символа
        finalGrid[i] = [
            strip[stop],
            strip[stop + 1],
            strip[stop + 2]
        ];

        setTimeout(() => {
            reel.style.transform = `translateY(-${stop * 80}px)`;
        }, i * 200);
    });

    setTimeout(() => {
        checkWin(finalGrid);
        spinning = false;
        btn.disabled = false;
    }, 1400);
}

function checkWin(gridCols) {
    // превращаем в привычную 3x3 матрицу
    let g = [
        [gridCols[0][0], gridCols[1][0], gridCols[2][0]],
        [gridCols[0][1], gridCols[1][1], gridCols[2][1]],
        [gridCols[0][2], gridCols[1][2], gridCols[2][2]]
    ];

    let lines = [
        [g[0][0], g[0][1], g[0][2]],
        [g[1][0], g[1][1], g[1][2]],
        [g[2][0], g[2][1], g[2][2]],
        [g[0][0], g[1][0], g[2][0]],
        [g[0][1], g[1][1], g[2][1]],
        [g[0][2], g[1][2], g[2][2]],
        [g[0][0], g[1][1], g[2][2]],
        [g[0][2], g[1][1], g[2][0]]
    ];

    let win = 0;

    lines.forEach(line => {
        if (line[0] === line[1] && line[1] === line[2]) {
            win += reward;
        }
    });

    balance += win;
    updateUI();
}

btn.onclick = spin;
updateUI();
</script>

</body>
</html>
