<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Slot Machine</title>

<style>
body {
    background: #000;
    color: #c3e63e;
    font-family: Arial, sans-serif;
    text-align: center;
}

#machine {
    width: 300px;
    margin: 40px auto;
    padding: 20px;
    background: #021e00;
    border: 4px solid #83b625;
}

.window {
    display: flex;
    justify-content: space-between;
    background: #000;
    padding: 10px;
}

.reel {
    width: 80px;
    height: 80px;
    overflow: hidden;
    border: 2px solid #83b625;
    position: relative;
}

.strip {
    position: absolute;
    width: 100%;
    transition: transform 0.6s ease-out;
}

.symbol {
    width: 80px;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.symbol img {
    width: 60px;
}

button {
    margin-top: 15px;
    padding: 10px 20px;
}

button:disabled {
    opacity: 0.5;
}
</style>
</head>

<body>

<h3>Баланс: <span id="money"></span></h3>

<div id="machine">
    <div class="window">
        <div class="reel"><div class="strip" id="r1"></div></div>
        <div class="reel"><div class="strip" id="r2"></div></div>
        <div class="reel"><div class="strip" id="r3"></div></div>
    </div>

    <button id="spinBtn">SPIN</button>
</div>

<script>
const icons = [
    "symbol1.png",
    "symbol2.png",
    "symbol3.png",
    "symbol4.png",
    "symbol5.png"
];

const cost = 10;
const reward = 120;

let balance = 250;
let spinning = false;

const reels = [
    document.getElementById("r1"),
    document.getElementById("r2"),
    document.getElementById("r3")
];

const btn = document.getElementById("spinBtn");

function updateUI() {
    document.getElementById("money").innerText = balance;
}

function createStrip() {
    let arr = [];
    for (let i = 0; i < 20; i++) {
        arr.push(icons[Math.floor(Math.random() * icons.length)]);
    }
    return arr;
}

function render(reel, strip) {
    reel.innerHTML = "";
    strip.forEach(icon => {
        const el = document.createElement("div");
        el.className = "symbol";
        el.innerHTML = `<img src="${icon}">`;
        reel.appendChild(el);
    });
}

function spin() {
    if (spinning || balance < cost) return;

    spinning = true;
    btn.disabled = true;

    balance -= cost;
    updateUI();

    let results = [];

    reels.forEach((reel, i) => {
        let strip = createStrip();
        render(reel, strip);

        // случайная остановка
        let stopIndex = Math.floor(Math.random() * (strip.length - 3));
        results[i] = strip[stopIndex + 1];

        setTimeout(() => {
            reel.style.transform = `translateY(-${stopIndex * 80}px)`;
        }, i * 200);
    });

    setTimeout(() => {
        checkWin(results);
        spinning = false;
        btn.disabled = false;
    }, 1200);
}

function checkWin(res) {
    if (res[0] === res[1] && res[1] === res[2]) {
        balance += reward;
    }
    updateUI();
}

btn.onclick = spin;
updateUI();
</script>

</body>
</html>
