<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Slot 3x3 + Leaderboard</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body {
    background: #000;
    color: #c3e63e;
    font-family: Arial;
    text-align: center;
}

#machine {
    width: 320px;
    margin: 20px auto;
    padding: 20px;
    background: #021e00;
    border: 4px solid #83b625;
}

.window {
    display: flex;
    gap: 10px;
    background: #000;
    padding: 10px;
}

.reel {
    width: 80px;
    height: 240px;
    overflow: hidden;
    border: 2px solid #83b625;
    position: relative;
}

.strip {
    position: absolute;
    width: 100%;
    transition: transform 0.7s cubic-bezier(.2,.6,.3,1);
}

.symbol {
    width: 80px;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.symbol img {
    width: 60px;
}

button {
    margin-top: 10px;
    padding: 10px 20px;
}

button:disabled {
    opacity: 0.5;
}

#board {
    margin-top: 20px;
    font-size: 14px;
}
</style>
</head>

<body>

<h3>Баланс: <span id="money"></span></h3>
<h4>Игрок: <span id="name"></span></h4>

<div id="machine">
    <div class="window">
        <div class="reel"><div class="strip" id="r1"></div></div>
        <div class="reel"><div class="strip" id="r2"></div></div>
        <div class="reel"><div class="strip" id="r3"></div></div>
    </div>

    <button id="spinBtn">SPIN</button>
    <button onclick="changeName()">Сменить ник</button>

    <h4>TOP</h4>
    <div id="board"></div>
</div>

<script>

import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";

const firebaseConfig = {
  apiKey: "AIzaSyBHu6nNgmxC_Ll7eOMLSDryjx8pIdG4OQ8",
  authDomain: "chronicles-990c0.firebaseapp.com",
  projectId: "chronicles-990c0",
  storageBucket: "chronicles-990c0.firebasestorage.app",
  messagingSenderId: "1028854285177",
  appId: "1:1028854285177:web:0fa5158ad78a49f53b25a8",
  measurementId: "G-3NRK6QY8RT"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);

const icons = ["symbol1.png","symbol2.png","symbol3.png","symbol4.png","symbol5.png"];

const cost = 20;
const reward = 100;

let balance = 0;
let lastBonus = 0;
let spinning = false;

let playerName = localStorage.getItem("slot_name") || "Player";

document.getElementById("name").innerText = playerName;


const reels = [
    document.getElementById("r1"),
    document.getElementById("r2"),
    document.getElementById("r3")
];

const btn = document.getElementById("spinBtn");
const moneyEl = document.getElementById("money");


function saveLocal() {
    localStorage.setItem("slot_balance", balance);
    localStorage.setItem("slot_last", lastBonus);
}

function loadLocal() {
    balance = parseInt(localStorage.getItem("slot_balance")) || 200;
    lastBonus = parseInt(localStorage.getItem("slot_last")) || Date.now();
    applyBonus();
}

function applyBonus() {
    const now = Date.now();
    const day = 86400000;

    if (now - lastBonus >= day) {
        const d = Math.floor((now - lastBonus) / day);
        balance += d * 100;
        lastBonus += d * day;
        saveLocal();
    }
}


function updateUI() {
    moneyEl.innerText = balance;
    saveLocal();
    saveFirebase();
}


function saveFirebase() {
    db.ref("leaderboard/" + playerName).set({
        balance: balance,
        updated: Date.now()
    });
}

function loadLeaderboard() {
    db.ref("leaderboard")
    .orderByChild("balance")
    .limitToLast(10)
    .on("value", snap => {
        const data = snap.val() || {};

        let arr = Object.entries(data)
            .map(([name,v]) => ({name, balance:v.balance}))
            .sort((a,b)=>b.balance-a.balance);

        const board = document.getElementById("board");
        board.innerHTML = "";

        arr.forEach((p,i)=>{
            const div = document.createElement("div");
            div.textContent = `${i+1}. ${p.name} — ${p.balance}`;
            board.appendChild(div);
        });
    });
}


function createStrip() {
    let arr = [];
    for (let i=0;i<30;i++) {
        arr.push(icons[Math.floor(Math.random()*icons.length)]);
    }
    return arr;
}

function render(reel, strip) {
    reel.innerHTML = "";
    strip.forEach(icon=>{
        const d=document.createElement("div");
        d.className="symbol";
        d.innerHTML=`<img src="${icon}">`;
        reel.appendChild(d);
    });
}

function spin() {
    if (spinning || balance < cost) return;

    spinning = true;
    btn.disabled = true;

    balance -= cost;
    updateUI();

    let grid = [[],[],[]];

    reels.forEach((reel,i)=>{
        let strip=createStrip();
        render(reel,strip);

        let stop=Math.floor(Math.random()*(strip.length-3));

        grid[i]=[
            strip[stop],
            strip[stop+1],
            strip[stop+2]
        ];

        setTimeout(()=>{
            reel.style.transform=`translateY(-${stop*80}px)`;
        },i*200);
    });

    setTimeout(()=>{
        checkWin(grid);
        spinning=false;
        btn.disabled=false;
    },1400);
}


function checkWin(gcols){
    let g=[
        [gcols[0][0],gcols[1][0],gcols[2][0]],
        [gcols[0][1],gcols[1][1],gcols[2][1]],
        [gcols[0][2],gcols[1][2],gcols[2][2]]
    ];

    let lines=[
        [g[0][0],g[0][1],g[0][2]],
        [g[1][0],g[1][1],g[1][2]],
        [g[2][0],g[2][1],g[2][2]],
        [g[0][0],g[1][0],g[2][0]],
        [g[0][1],g[1][1],g[2][1]],
        [g[0][2],g[1][2],g[2][2]],
        [g[0][0],g[1][1],g[2][2]],
        [g[0][2],g[1][1],g[2][0]]
    ];

    let win=0;

    lines.forEach(l=>{
        if(l[0]===l[1]&&l[1]===l[2]) win+=reward;
    });

    balance+=win;
    updateUI();
}

function changeName(){
    let n=prompt("Ник:");
    if(n && n.trim()){
        playerName=n.trim();
        localStorage.setItem("slot_name",playerName);
        document.getElementById("name").innerText=playerName;
        saveFirebase();
    }
}


btn.onclick=spin;

loadLocal();
updateUI();
loadLeaderboard();
</script>

</body>
</html>
