<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Slot Game</title>

<style>
body {
    background: #000300;
    color: #c3e63e;
    font-family: Arial, sans-serif;
    text-align: center;
}

h1 {
    color: #ffffff;
}

#balance {
    margin: 10px;
}

.slot {
    display: grid;
    grid-template-columns: repeat(3, 80px);
    gap: 10px;
    justify-content: center;
    margin: 20px;
}

.cell {
    width: 80px;
    height: 80px;
    background: #021e00;
    border: 2px solid #83b625;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
}

.cell img {
    width: 60px;
    height: 60px;
}

.spin {
    animation: spin 0.6s ease-out;
}

@keyframes spin {
    0% { transform: translateY(-100px); }
    100% { transform: translateY(0); }
}

.highlight {
    border: 3px solid #c3e63e;
}

button {
    background: #83b625;
    color: #000;
    padding: 10px 20px;
    border: none;
    cursor: pointer;
}

#resultIcon img {
    width: 120px;
    margin-top: 10px;
}
</style>
</head>

<body>

<h1>Slots</h1>

<div id="balance">
    <img src="Croners.png" width="20"> <span id="money"></span>
</div>

<button onclick="spin()">SPIN (25)</button>

<div class="slot" id="slot"></div>

<div id="resultIcon"></div>

<script>
const icons = ["symbol1.png","symbol2.png","symbol3.png","symbol4.png","symbol5.png","symbol6.png"];
const cost = 25;
const reward = 100;

let grid = [];
let balance = loadBalance();

function loadBalance() {
    let data = JSON.parse(localStorage.getItem("slotData"));
    let today = new Date().toDateString();

    if (!data) {
        data = { money: 250, lastLogin: today };
    }

    if (data.lastLogin !== today) {
        data.money += 250;
        data.lastLogin = today;
    }

    localStorage.setItem("slotData", JSON.stringify(data));
    return data.money;
}

function saveBalance() {
    let data = JSON.parse(localStorage.getItem("slotData"));
    data.money = balance;
    localStorage.setItem("slotData", JSON.stringify(data));
}

function updateUI() {
    document.getElementById("money").innerText = balance;
}

function createGrid() {
    const slot = document.getElementById("slot");
    slot.innerHTML = "";
    grid = [];

    for (let i = 0; i < 9; i++) {
        let cell = document.createElement("div");
        cell.className = "cell";

        let img = document.createElement("img");
        img.src = icons[Math.floor(Math.random() * icons.length)];

        cell.appendChild(img);
        slot.appendChild(cell);

        grid.push({ cell, img });
    }
}

function spin() {
    if (balance < cost) return;

    balance -= cost;
    updateUI();
    saveBalance();

    document.getElementById("resultIcon").innerHTML = "";

    grid.forEach((g, i) => {
        g.cell.classList.remove("highlight");
        g.img.classList.add("spin");

        setTimeout(() => {
            g.img.src = icons[Math.floor(Math.random() * icons.length)];
            g.img.classList.remove("spin");

            if (i === 8) checkWin();
        }, 200 + i * 100);
    });
}

function checkWin() {
    let lines = [
        [0,1,2],[3,4,5],[6,7,8],
        [0,3,6],[1,4,7],[2,5,8],
        [0,4,8],[2,4,6]
    ];

    let winCells = [];

    lines.forEach(line => {
        let [a,b,c] = line;
        if (grid[a].img.src === grid[b].img.src &&
            grid[b].img.src === grid[c].img.src) {
            winCells.push(...line);
            balance += reward;
        }
    });

    // PLUS
    if (same([1,3,4,5,7])) {
        showIcon("Plus.png");
        balance += reward * 2;
    }

    // CROSS
    if (same([0,2,4,6,8])) {
        showIcon("Cross.png");
        balance += reward * 2;
    }

    // BINGO
    if (same([0,1,2,3,4,5,6,7,8])) {
        showIcon("Bingo.png");
        balance += reward * 5;
    }

    winCells.forEach(i => {
        grid[i].cell.classList.add("highlight");
    });

    updateUI();
    saveBalance();
}

function same(indexes) {
    let first = grid[indexes[0]].img.src;
    return indexes.every(i => grid[i].img.src === first);
}

function showIcon(src) {
    document.getElementById("resultIcon").innerHTML =
        `<img src="${src}">`;
}

createGrid();
updateUI();
</script>

</body>
</html>
