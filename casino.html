<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Казик</title>

<style>
body {
    background: #000300;
    color: #c3e63e;
    font-family: Arial, sans-serif;
    text-align: center;
}

h1 {
    color: #ffffff;
}

#machine {
    width: 320px;
    margin: 20px auto;
    padding: 20px;
    background: #021e00;
    border: 4px solid #83b625;
}

.window {
    display: flex;
    justify-content: center;
    gap: 10px;
    background: #000;
    padding: 10px;
}

.reel {
    width: 80px;
    height: 240px;
    overflow: hidden;
    border: 2px solid #83b625;
    background: #000;
    position: relative;
}

.strip {
    position: absolute;
    width: 100%;
}

.symbol {
    width: 80px;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.symbol img {
    width: 60px;
}

.spin {
    animation: spin 0.8s cubic-bezier(.2,.6,.3,1);
}

@keyframes spin {
    0% { transform: translateY(-400px); }
    100% { transform: translateY(0); }
}

button {
    margin-top: 15px;
    background: #83b625;
    border: none;
    padding: 10px 20px;
    cursor: pointer;
}

button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

#balance {
    margin: 10px;
}
</style>
</head>

<body>

<h1>Сдохни или умри</h1>

<div id="balance">
    <img src="Croners.png" width="20">
    <span id="money"></span>
</div>

<div id="machine">
    <div class="window">
        <div class="reel"><div class="strip" id="r1"></div></div>
        <div class="reel"><div class="strip" id="r2"></div></div>
        <div class="reel"><div class="strip" id="r3"></div></div>
    </div>

    <button id="spinBtn" onclick="spin()">SPIN (25)</button>
</div>

<div id="resultIcon"></div>

<script>
const icons = ["symbol1.png","symbol2.png","symbol3.png","symbol4.png","symbol5.png","symbol6.png"];
const cost = 25;
const reward = 100;

let balance = loadBalance();
let isSpinning = false;
let finished = 0;

let reels = [
    document.getElementById("r1"),
    document.getElementById("r2"),
    document.getElementById("r3")
];

const button = document.getElementById("spinBtn");

function loadBalance() {
    let data = JSON.parse(localStorage.getItem("slotData"));
    let today = new Date().toDateString();

    if (!data) data = { money: 67676767, lastLogin: today };

    if (data.lastLogin !== today) {
        data.money += 250;
        data.lastLogin = today;
    }

    localStorage.setItem("slotData", JSON.stringify(data));
    return data.money;
}

function saveBalance() {
    let data = JSON.parse(localStorage.getItem("slotData"));
    data.money = balance;
    localStorage.setItem("slotData", JSON.stringify(data));
}

function updateUI() {
    document.getElementById("money").innerText = balance;
}

function generateStrip(reel) {
    reel.innerHTML = "";
    let arr = [];

    for (let i = 0; i < 10; i++) {
        let icon = icons[Math.floor(Math.random() * icons.length)];
        arr.push(icon);

        let div = document.createElement("div");
        div.className = "symbol";
        div.innerHTML = `<img src="${icon}">`;

        reel.appendChild(div);
    }

    return arr;
}

let resultGrid = [];

function spin() {
    if (isSpinning) return;
    if (balance < cost) return;

    isSpinning = true;
    button.disabled = true;
    finished = 0;

    balance -= cost;
    updateUI();
    saveBalance();

    document.getElementById("resultIcon").innerHTML = "";
    resultGrid = [];

    reels.forEach((reel, index) => {
        let strip = generateStrip(reel);

        reel.classList.add("spin");

        setTimeout(() => {
            reel.classList.remove("spin");

            let visible = strip.slice(3, 6);
            resultGrid[index] = visible;

            finished++;

            if (finished === 3) {
                setTimeout(checkWin, 100);
            }
        }, 400 + index * 300);
    });
}

function checkWin() {
    let grid = [
        resultGrid[0][0], resultGrid[1][0], resultGrid[2][0],
        resultGrid[0][1], resultGrid[1][1], resultGrid[2][1],
        resultGrid[0][2], resultGrid[1][2], resultGrid[2][2],
    ];

    let lines = [
        [0,1,2],[3,4,5],[6,7,8],
        [0,3,6],[1,4,7],[2,5,8],
        [0,4,8],[2,4,6]
    ];

    lines.forEach(line => {
        let [a,b,c] = line;
        if (grid[a] === grid[b] && grid[b] === grid[c]) {
            balance += reward;
        }
    });

    if (same(grid, [1,3,4,5,7])) {
        showIcon("Plus.png");
        balance += reward * 2;
    }

    if (same(grid, [0,2,4,6,8])) {
        showIcon("Cross.png");
        balance += reward * 2;
    }

    if (same(grid, [0,1,2,3,4,5,6,7,8])) {
        showIcon("Bingo.png");
        balance += reward * 5;
    }

    updateUI();
    saveBalance();

    isSpinning = false;
    button.disabled = false;
}

function same(grid, indexes) {
    let first = grid[indexes[0]];
    return indexes.every(i => grid[i] === first);
}

function showIcon(src) {
    document.getElementById("resultIcon").innerHTML =
        `<img src="${src}" width="120">`;
}

updateUI();
</script>

</body>
</html>
