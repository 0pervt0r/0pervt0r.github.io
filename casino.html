<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Slot 3x3 + Firebase</title>

<style>
body {
    background: #000;
    color: #c3e63e;
    font-family: Arial;
    text-align: center;
}

#machine {
    width: 320px;
    margin: 20px auto;
    padding: 20px;
    background: #021e00;
    border: 4px solid #83b625;
}

.window {
    display: flex;
    gap: 10px;
    background: #000;
    padding: 10px;
}

.reel {
    width: 80px;
    height: 240px;
    overflow: hidden;
    border: 2px solid #83b625;
    position: relative;
}

.strip {
    position: absolute;
    width: 100%;
    transition: transform 0.7s cubic-bezier(.2,.6,.3,1);
}

.symbol {
    width: 80px;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.symbol img {
    width: 60px;
}

button {
    margin-top: 10px;
    padding: 10px 15px;
}
</style>
</head>

<body>

<h3>Баланс: <span id="money">0</span></h3>
<h4>Игрок: <span id="name">-</span></h4>

<div id="machine">
    <div class="window">
        <div class="reel"><div class="strip" id="r1"></div></div>
        <div class="reel"><div class="strip" id="r2"></div></div>
        <div class="reel"><div class="strip" id="r3"></div></div>
    </div>

    <button id="spinBtn">SPIN</button>
    <button onclick="changeName()">Сменить ник</button>

    <h4>TOP</h4>
    <div id="board"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
    getDatabase,
    ref,
    set,
    onValue,
    query,
    orderByChild,
    limitToLast
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// ---------- FIREBASE ----------
const firebaseConfig = {
  apiKey: "AIzaSyBHu6nNgmxC_Ll7eOMLSDryjx8pIdG4OQ8",
  authDomain: "chronicles-990c0.firebaseapp.com",
  databaseURL: "https://chronicles-990c0-default-rtdb.firebaseio.com",
  projectId: "chronicles-990c0",
  storageBucket: "chronicles-990c0.appspot.com",
  messagingSenderId: "1028854285177",
  appId: "1:1028854285177:web:0fa5158ad78a49f53b25a8",
  measurementId: "G-3NRK6QY8RT"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ---------- GAME ----------
const icons = ["symbol1.png","symbol2.png","symbol3.png","symbol4.png","symbol5.png"];
const cost = 20;
const reward = 100;

let balance = 0;
let spinning = false;

let playerName = localStorage.getItem("slot_name") || "Player";

document.getElementById("name").innerText = playerName;

// ---------- UI ----------
const moneyEl = document.getElementById("money");
const btn = document.getElementById("spinBtn");

const reels = [
    document.getElementById("r1"),
    document.getElementById("r2"),
    document.getElementById("r3")
];

// ---------- LOCAL SAVE ----------
function loadLocal() {
    balance = parseInt(localStorage.getItem("slot_balance")) || 200;
    updateUI();
}

function saveLocal() {
    localStorage.setItem("slot_balance", balance);
}

// ---------- FIREBASE SAVE ----------
function saveScore() {
    set(ref(db, "leaderboard/" + playerName), {
        balance: balance,
        updated: Date.now()
    });
}

// ---------- LEADERBOARD ----------
function loadLeaderboard() {
    const q = query(ref(db, "leaderboard"), orderByChild("balance"), limitToLast(10));

    onValue(q, (snap) => {
        const data = snap.val() || {};

        let arr = Object.entries(data)
            .map(([name,v]) => ({name, balance:v.balance}))
            .sort((a,b)=>b.balance-a.balance);

        const board = document.getElementById("board");
        board.innerHTML = "";

        arr.forEach((p,i)=>{
            const div = document.createElement("div");
            div.textContent = `${i+1}. ${p.name} — ${p.balance}`;
            board.appendChild(div);
        });
    });
}

// ---------- SLOT ----------
function createStrip() {
    let arr=[];
    for(let i=0;i<30;i++){
        arr.push(icons[Math.floor(Math.random()*icons.length)]);
    }
    return arr;
}

function render(reel, strip){
    reel.innerHTML="";
    strip.forEach(icon=>{
        const d=document.createElement("div");
        d.className="symbol";
        d.innerHTML=`<img src="${icon}">`;
        reel.appendChild(d);
    });
}

function spin(){
    if(spinning || balance < cost) return;

    spinning = true;
    btn.disabled = true;

    balance -= cost;
    updateUI();

    let grid=[[],[],[]];

    reels.forEach((reel,i)=>{
        let strip=createStrip();
        render(reel,strip);

        let stop=Math.floor(Math.random()*(strip.length-3));

        grid[i]=[
            strip[stop],
            strip[stop+1],
            strip[stop+2]
        ];

        setTimeout(()=>{
            reel.style.transform=`translateY(-${stop*80}px)`;
        }, i*200);
    });

    setTimeout(()=>{
        checkWin(grid);
        spinning=false;
        btn.disabled=false;
    },1400);
}

function checkWin(g){
    let m=[
        [g[0][0],g[1][0],g[2][0]],
        [g[0][1],g[1][1],g[2][1]],
        [g[0][2],g[1][2],g[2][2]]
    ];

    let lines=[
        [m[0][0],m[0][1],m[0][2]],
        [m[1][0],m[1][1],m[1][2]],
        [m[2][0],m[2][1],m[2][2]],
        [m[0][0],m[1][0],m[2][0]],
        [m[0][1],m[1][1],m[2][1]],
        [m[0][2],m[1][2],m[2][2]],
        [m[0][0],m[1][1],m[2][2]],
        [m[0][2],m[1][1],m[2][0]]
    ];

    let win=0;

    lines.forEach(l=>{
        if(l[0]===l[1] && l[1]===l[2]) win+=reward;
    });

    balance+=win;
    updateUI();
}

function updateUI(){
    moneyEl.innerText=balance;
    saveLocal();
    saveScore();
}

// ---------- NAME ----------
function changeName(){
    let n=prompt("Ник:");
    if(n && n.trim()){
        playerName=n.trim();
        localStorage.setItem("slot_name",playerName);
        document.getElementById("name").innerText=playerName;
        saveScore();
    }
}

// ---------- INIT ----------
btn.onclick=spin;

loadLocal();
loadLeaderboard();
updateUI();

</script>
</body>
</html>
