<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Казик</title>

<style>
body {
    background: #000300;
    color: #c3e63e;
    font-family: Arial, sans-serif;
    text-align: center;
}

h1 {
    color: #ffffff;
}

#machine {
    width: 320px;
    margin: 20px auto;
    padding: 20px;
    background: #021e00;
    border: 4px solid #83b625;
}

.window {
    display: flex;
    justify-content: center;
    gap: 10px;
    background: #000;
    padding: 10px;
}

.reel {
    width: 80px;
    height: 240px;
    overflow: hidden;
    border: 2px solid #83b625;
    background: #000;
    position: relative;
}

.symbol {
    width: 80px;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.symbol img {
    width: 60px;
}

.spin {
    animation: spin 0.8s cubic-bezier(.2,.6,.3,1);
}

@keyframes spin {
    0% { transform: translateY(-400px); }
    100% { transform: translateY(0); }
}

button {
    margin-top: 15px;
    background: #83b625;
    border: none;
    padding: 10px 20px;
    cursor: pointer;
}

button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

#balance {
    margin: 10px;
}
</style>
</head>

<body>

<h1>Слот</h1>

<div id="balance">
    <img src="Croners.png" width="20">
    <span id="money"></span>
</div>

<div id="machine">
    <div class="window">
        <div class="reel" id="r1"></div>
        <div class="reel" id="r2"></div>
        <div class="reel" id="r3"></div>
    </div>

    <button id="spinBtn" onclick="spin()">SPIN (25)</button>
</div>

<div id="resultIcon"></div>

<script>
const icons = ["symbol1.png","symbol2.png","symbol3.png","symbol4.png","symbol5.png","symbol6.png"];
const cost = 25;
const reward = 100;

let balance = loadBalance();
let isSpinning = false;

const reels = [
    document.getElementById("r1"),
    document.getElementById("r2"),
    document.getElementById("r3")
];

const button = document.getElementById("spinBtn");

function loadBalance() {
    let data = JSON.parse(localStorage.getItem("slotData"));
    let today = new Date().toDateString();

    if (!data) data = { money: 250, lastLogin: today };

    if (data.lastLogin !== today) {
        data.money += 250;
        data.lastLogin = today;
    }

    localStorage.setItem("slotData", JSON.stringify(data));
    return data.money;
}

function saveBalance() {
    let data = JSON.parse(localStorage.getItem("slotData"));
    data.money = balance;
    localStorage.setItem("slotData", JSON.stringify(data));
}

function updateUI() {
    document.getElementById("money").innerText = balance;
}

function generateStripWithCenter(centerSymbol) {
    let arr = [];

    for (let i = 0; i < 10; i++) {
        arr.push(icons[Math.floor(Math.random() * icons.length)]);
    }

    // центр (визуально и логически)
    arr[4] = centerSymbol;

    return arr;
}

function renderReel(reel, strip) {
    reel.innerHTML = "";

    strip.forEach(icon => {
        let div = document.createElement("div");
        div.className = "symbol";
        div.innerHTML = `<img src="${icon}">`;
        reel.appendChild(div);
    });
}

function spin() {
    if (isSpinning) return;
    if (balance < cost) return;

    isSpinning = true;
    button.disabled = true;

    balance -= cost;
    updateUI();
    saveBalance();

    document.getElementById("resultIcon").innerHTML = "";

    // финальный результат (центральная линия)
    let result = [
        icons[Math.floor(Math.random() * icons.length)],
        icons[Math.floor(Math.random() * icons.length)],
        icons[Math.floor(Math.random() * icons.length)]
    ];

    let finished = 0;

    reels.forEach((reel, index) => {
        let strip = generateStripWithCenter(result[index]);

        renderReel(reel, strip);

        reel.classList.add("spin");

        setTimeout(() => {
            reel.classList.remove("spin");

            finished++;
            if (finished === 3) {
                setTimeout(() => checkWin(result), 100);
            }
        }, 400 + index * 300);
    });
}

function checkWin(result) {
    // проверяем только центральную линию
    if (result[0] === result[1] && result[1] === result[2]) {
        balance += reward;
    }

    updateUI();
    saveBalance();

    isSpinning = false;
    button.disabled = false;
}

updateUI();
</script>

</body>
</html>
