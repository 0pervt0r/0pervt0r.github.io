<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Urbanshade Chronicles Wiki</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

    .viewer {
        width: 95vw;
        max-width: 1200px;
        height: 60vh;
        max-height: 800px;
        border: 3px solid #444;
        border-radius: 10px;
        overflow: hidden;
        background: black;
        touch-action: none;
        position: relative;
    }


    #img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        transform-origin: center center;
        user-select: none;
        pointer-events: none;
        position: absolute;
        top: 0;
        left: 0;
    }
</style>
</head>

<body>
    <div class="page-wrapper">
    <aside class="sidebar">
        <div class="logo-block">
            <img src="ChroniclesLogo.png">
        </div>

        <nav class="menu">
            <a href="https://0pervt0r.github.io">Главная страница</a>
            <a href="#">Летопись</a>
            <a href="#">Персонажи</a>
            <a href="#">Документы</a>
            <a href="#">Карта комплекса</a>

            <div class="divider"></div>

            <a href="#">Правила</a>
            <a href="#">Карта взаимоотношений</a>
        </nav>
    </aside>
<main class="content">
    <div class="viewer" id="viewer">
        <img src="RelChart.png" id="img" alt="RelChart" />
    </div>
 </main>
</div>


<script>
const viewer = document.getElementById("viewer");
const img = document.getElementById("img");

let scale = 1;
let minScale = 1;
let maxScale = 5;

let posX = 0, posY = 0;
let startX = 0, startY = 0;
let dragging = false;


function clampPosition() {
    const rect = viewer.getBoundingClientRect();
    const imgRect = img.getBoundingClientRect();

    let dx = imgRect.width - rect.width;
    let dy = imgRect.height - rect.height;

    if (dx <= 0) posX = 0;
    else {
        posX = Math.min(posX, dx/2);
        posX = Math.max(posX, -dx/2);
    }

    if (dy <= 0) posY = 0;
    else {
        posY = Math.min(posY, dy/2);
        posY = Math.max(posY, -dy/2);
    }

    img.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
}


viewer.addEventListener("wheel", (e) => {
    e.preventDefault();
    let oldScale = scale;

    scale += e.deltaY * -0.001;
    scale = Math.min(Math.max(minScale, scale), maxScale);

    
    let rect = viewer.getBoundingClientRect();
    let offsetX = e.clientX - rect.left - rect.width/2;
    let offsetY = e.clientY - rect.top - rect.height/2;

    posX -= offsetX * (scale - oldScale);
    posY -= offsetY * (scale - oldScale);

    clampPosition();
});


viewer.addEventListener("mousedown", (e) => {
    dragging = true;
    startX = e.clientX - posX;
    startY = e.clientY - posY;
});

viewer.addEventListener("mousemove", (e) => {
    if (!dragging) return;
    posX = e.clientX - startX;
    posY = e.clientY - startY;
    clampPosition();
});

viewer.addEventListener("mouseup", () => dragging = false);
viewer.addEventListener("mouseleave", () => dragging = false);


let touchDist = 0;

function getDist(touches) {
    return Math.hypot(
        touches[0].pageX - touches[1].pageX,
        touches[0].pageY - touches[1].pageY
    );
}

viewer.addEventListener("touchstart", (e) => {
    if (e.touches.length === 1) {
        startX = e.touches[0].clientX - posX;
        startY = e.touches[0].clientY - posY;
    } else if (e.touches.length === 2) {
        touchDist = getDist(e.touches);
    }
});

viewer.addEventListener("touchmove", (e) => {
    e.preventDefault();

    if (e.touches.length === 1) {
        posX = e.touches[0].clientX - startX;
        posY = e.touches[0].clientY - startY;
        clampPosition();
    } else if (e.touches.length === 2) {
        let newDist = getDist(e.touches);
        let oldScale = scale;

        scale *= newDist / touchDist;
        touchDist = newDist;

        scale = Math.min(Math.max(minScale, scale), maxScale);
        clampPosition();
    }
});
</script>

<footer class="footer">
    <p>Urbanshade Chronicles © 2026</p>
</footer>

</body>
</html>
</body>
</html>
