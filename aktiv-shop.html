<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AKTIV SHOP</title>
  <link rel="stylesheet" href="shop-style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- AUTH SCREEN -->
  <div id="auth-screen" class="auth-screen">
    <div class="auth-box">
      <div class="auth-logo">URBANSHADE</div>
      <div class="auth-form">
        <input type="text" id="auth-username" placeholder="ваш ник" autocomplete="off" />
        <button id="auth-btn">ВОЙТИ</button>
      </div>
      <div id="auth-error" class="auth-error"></div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app" class="app hidden">

    <!-- HEADER -->
    <header class="site-header">
      <div class="header-left">
        <span class="header-title">AKTIV SHOP</span>
      </div>
      <div class="header-user">
        <span id="hdr-name" class="hdr-name"></span>
        <div class="hdr-currency">
          <span class="hdr-crona"><img src="shop-croner.png" class="ico" onerror="this.style.display='none'" /><span id="hdr-crona-val">—</span> кр.</span>
          <span class="hdr-bonus"><img src="shop-bonus.png" class="ico" onerror="this.style.display='none'" /><span id="hdr-bonus-val">—</span> бон.</span>
        </div>
        <button class="btn-exchange" id="open-exchange">ОБМЕН</button>
        <button class="btn-logout" id="logout-btn">ВЫХОД</button>
      </div>
    </header>

    <!-- NAV TABS -->
    <nav class="tab-nav">
      <button class="tab-btn active" data-tab="shop"> МАГАЗИН</button>
      <button class="tab-btn" data-tab="leaders">ТАБЛИЦА ЛИДЕРОВ</button>
      <button class="tab-btn" data-tab="inventory">ИНВЕНТАРЬ</button>
    </nav>

<!-- SHOP TAB -->
<section id="tab-shop" class="tab-content active">
  <div class="shop-frame-wrapper">
    <div class="shop-stage">
      <img class="shop-stage-frame" src="shop-front.png" alt="" />
      <div class="shop-inner">
        <div class="shop-grid" id="shop-grid">
          <!-- items injected by JS -->
        </div>
      </div>
    </div>
  </div>

  <div class="bonus-shop-wrapper">
    <div class="bonus-shop-title">
      <img src="shop-bonus.png" class="ico" onerror="this.style.display='none'" />
      ЗА БОНУСЫ
    </div>
    <div class="bonus-shop-grid" id="bonus-shop-grid">
      <!-- bonus items injected by JS -->
    </div>
  </div>
</section>

    <!-- LEADERS TAB -->
    <section id="tab-leaders" class="tab-content hidden">
      <div class="leaders-wrap">
        <div class="leaders-col">
          <div class="leaders-title"><img src="shop-croner.png" class="ico" onerror="this.style.display='none'" /> ТОП ПО КРОНАМ</div>
          <table class="leaders-table" id="table-crona">
            <thead><tr><th>#</th><th>Участник</th><th>Кроны</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
        <div class="leaders-col">
          <div class="leaders-title"><img src="shop-bonus.png" class="ico" onerror="this.style.display='none'" /> ТОП ПО БОНУСАМ</div>
          <table class="leaders-table" id="table-bonus">
            <thead><tr><th>#</th><th>Участник</th><th>Бонусы</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </section>

<section id="tab-inventory" class="tab-content hidden">
  <div class="inventory-wrap" id="inventory-grid">
  </div>
</section>

  </div><!-- /app -->

  <!-- ITEM MODAL -->
  <div id="item-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <button class="modal-close" id="modal-close">✕</button>
      <div class="modal-img-wrap">
        <img id="modal-img" src="" alt="" onerror="this.style.opacity='0.3'" />
      </div>
      <div class="modal-name" id="modal-name"></div>
      <div class="modal-price" id="modal-price"></div>
      <div class="modal-desc" id="modal-desc"></div>
      <div class="modal-note" id="modal-note"></div>
      <button class="modal-buy-btn" id="modal-buy-btn">КУПИТЬ</button>
    </div>
  </div>

  <!-- BONUS ITEM MODAL -->
  <div id="bonus-item-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <button class="modal-close" id="bonus-modal-close">✕</button>
      <div class="modal-img-wrap">
        <img id="bonus-modal-img" src="" alt="" onerror="this.style.opacity='0.3'" />
      </div>
      <div class="modal-name" id="bonus-modal-name"></div>
      <div class="modal-price" id="bonus-modal-price"></div>
      <div class="modal-desc" id="bonus-modal-desc"></div>
      <div class="modal-note">Применяется сразу при покупке.</div>
      <button class="modal-buy-btn" id="bonus-modal-buy-btn">ИСПОЛЬЗОВАТЬ</button>
    </div>
  </div>

  <!-- EXCHANGE MODAL -->
  <div id="exchange-modal" class="modal-overlay hidden">
    <div class="modal-box exchange-box">
      <button class="modal-close" id="exchange-close">✕</button>
      <div class="modal-name">ОБМЕН ВАЛЮТЫ</div>
      <div class="exchange-options">
        <div class="exchange-card" id="ex-bonus-to-crona">
          <div class="ex-label">1 бонус → 25 крон</div>
          <div class="ex-note">У вас: <span id="ex-bonus-count">—</span> бонусов</div>
          <button class="ex-btn" id="btn-bonus-to-crona">ОБМЕНЯТЬ</button>
        </div>
        <div class="exchange-card" id="ex-crona-to-bonus">
          <div class="ex-label">30 крон → 1 бонус</div>
          <div class="ex-note">У вас: <span id="ex-crona-count">—</span> крон</div>
          <button class="ex-btn" id="btn-crona-to-bonus">ОБМЕНЯТЬ</button>
        </div>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast hidden"></div>

  <script src="supabase.js"></script>
  <script src="shop.js"></script>
</body>
</html>
